<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unihockey – Anmeldung</title>
  <meta name="description" content="Melde dein Unihockey-Team an und sieh, welche Teams schon dabei sind." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏑</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
  <script src="config.js"></script>
</head>
<body>
  <header class="hero">
    <h1 id="title">Unihockey</h1>
    <p id="subtitle">Melde dein Team an – und sieh, wer schon dabei ist.</p>
    <a id="cta" class="cta" href="#" target="_blank" rel="noopener" hidden>Team anmelden</a>
  </header>

  <main>
    <div class="section-head">
      <h2 id="table-title">Angemeldete Teams</h2>
      <button id="refresh" type="button" title="Neu laden">↻</button>
    </div>

    <input id="search" type="search" placeholder="Team filtern…" autocomplete="off" />

    <div id="status" class="status" role="status"></div>

    <div class="table-wrap">
      <table id="table" hidden>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>

  <footer>
    <span id="meta"></span>
    <span class="dot">•</span>
    <a href="https://github.com/marcoullmann/unihockey" target="_blank" rel="noopener">source</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
